services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: task_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  nats:
    image: nats:2.11
    command: 
      - "-js"
      - "-m"
      - "8222"
    ports:
      - "4222:4222"
      - "8222:8222"